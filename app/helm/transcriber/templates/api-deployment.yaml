apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: {{ include "transcriber.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: API_URL
              value: "http://api:5000"
            - name: DATABASE_URL
              value: "{{ .Values.env.DATABASE_URL }}"
            - name: S3_VIDEO_BUCKET_NAME
              value: "{{ .Values.env.S3_VIDEO_BUCKET_NAME }}"
            - name: HUGGINGFACE_API_KEY
              value: "{{ .Values.env.OPENAI_API_KEY }}"
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
