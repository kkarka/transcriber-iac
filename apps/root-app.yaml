apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transcriber-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/kkarka/transcriber-iac
    targetRevision: main
    path: apps/envs/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true